name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Instalar dependencias (backend)
        working-directory: backend
        run: npm ci

      - name: Instalar dependencias (frontend)
        working-directory: frontend
        run: npm ci

      - name: ESLint — backend
        working-directory: backend
        run: npm run lint

      - name: ESLint — frontend
        working-directory: frontend
        run: npm run lint

      - name: TypeScript check — backend
        working-directory: backend
        run: npx tsc --noEmit

      - name: TypeScript check — frontend
        working-directory: frontend
        run: npm run type-check

  test:
    name: Testes Unitarios
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: portal_cartorial_test
          POSTGRES_USER: cartorial
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        working-directory: backend
        run: npm ci

      - name: Rodar testes unitarios com cobertura
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://cartorial:test_password@localhost:5432/portal_cartorial_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_jwt_secret_minimum_32_chars_long
          JWT_REFRESH_SECRET: test_refresh_secret_minimum_32_chars
        run: npm run test:cov

      - name: Upload coverage para Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags: backend-unit
          fail_ci_if_error: false

      - name: Verificar cobertura minima (70%)
        working-directory: backend
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "Cobertura de linhas: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "FALHOU: Cobertura ${COVERAGE}% abaixo do minimo de 70%"
            exit 1
          fi
          echo "OK: Cobertura ${COVERAGE}% atende ao minimo de 70%"

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Build backend (NestJS)
        working-directory: backend
        run: |
          npm ci
          npm run build
          echo "Build backend: OK"
          ls -la dist/

      - name: Build frontend (Next.js)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXTAUTH_URL: http://localhost:3001
          NEXTAUTH_SECRET: build_secret_placeholder
        run: |
          npm ci
          npm run build
          echo "Build frontend: OK"

      - name: Artefato do build backend
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 7

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push — API Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e push — Web App
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumo do CI
        run: |
          echo "## Pipeline CI concluida com sucesso!" >> $GITHUB_STEP_SUMMARY
          echo "- Imagem API: ghcr.io/${{ github.repository }}/api:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Imagem Web: ghcr.io/${{ github.repository }}/web:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
